naftiko: 1.0.0-alpha1
info:
  label: Elastic Transcoder
  description: Convert media files to play on smartphones, tablets, and PCs
  tags:
  - Amazon Web Services
  - Media
  - Transcoding
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
