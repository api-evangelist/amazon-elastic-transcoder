        method: GET
        description: Amazon Elastic Transcoder ListPipelines
        inputParameters:
        - name: Ascending
          in: query
          type: string
          required: false
          description: To list pipelines in chronological order by the date and time that they were created, enter <code>true</code>. To list pipelines in reverse chronological order, enter 
            <code>false</code>.
        - name: PageToken
          in: query
          type: string
          required: false
          description: "When Elastic Transcoder returns more than one page of results, use <code>pageToken</code> in subsequent <code>GET</code> requests to get each successive page of results. "
