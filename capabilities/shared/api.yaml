      path: /default
      description: Default resources
      operations:
      - name: ReadJob
        method: GET
        description: Amazon Elastic Transcoder ReadJob
        inputParameters:
        - name: Id
          in: path
          type: string
          required: true
          description: The identifier of the job for which you want to get detailed information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CancelJob
        method: DELETE
        description: Amazon Elastic Transcoder CancelJob
        inputParameters:
        - name: Id
          in: path
          type: string
          required: true
          description: <p>The identifier of the job that you want to cancel.</p> <p>To get a list of the jobs (including their <code>jobId</code>) that have a status of <code>Submitted</code>, use the
            <a>ListJobsByStatus</a> API action.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateJob
        method: POST
        description: Amazon Elastic Transcoder CreateJob
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
