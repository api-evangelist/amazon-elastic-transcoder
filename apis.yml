apis:
- name: Amazon Elastic Transcoder API
  description: >-
    The Amazon Elastic Transcoder API provides media transcoding in the cloud,
    enabling developers to convert media files from their source format into
    versions optimized for playback on various devices including smartphones,
    tablets, and PCs. The API allows you to create transcoding pipelines, define
    presets for output formats, submit transcoding jobs, and monitor their
    progress. It handles all aspects of the media transcoding process
    transparently and automatically.
