name: Amazon Elastic Transcoder
description: Amazon Elastic Transcoder is media transcoding in the cloud. It is designed to be a highly scalable, easy-to-use,
  and cost-effective way for developers and businesses to convert or transcode media files from their source format into versions
  that will play back on devices like smartphones, tablets, and PCs.
